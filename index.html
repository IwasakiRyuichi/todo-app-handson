<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO リスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-wrapper">

    <header class="app-header">
      <h1 class="app-title">TODO リスト</h1>
    </header>

    <main class="app-main">

      <!-- タスク入力フォームエリア -->
      <section class="task-form" aria-label="タスク入力">
        <form class="task-form__inner" action="#" method="get">
          <label for="task-input" class="visually-hidden">新しいタスクを入力</label>
          <input
            id="task-input"
            class="task-form__input"
            type="text"
            placeholder="新しいタスクを入力..."
          >
          <button class="task-form__button" type="submit">追加</button>
        </form>
      </section>

      <!-- フィルターボタンエリア -->
      <section class="task-filter" aria-label="タスクフィルター">
        <button class="task-filter__button is-active" type="button">すべて</button>
        <button class="task-filter__button" type="button">未完了</button>
        <button class="task-filter__button" type="button">完了済み</button>
      </section>

      <!-- タスク一覧表示エリア -->
      <section class="task-list-section" aria-label="タスク一覧">
        <ul id="task-list" class="task-list"></ul>
      </section>

    </main>

    <footer class="app-footer">
      <p id="footer-text" class="app-footer__text">0件のタスク</p>
    </footer>

  </div>
  <script src="app.js"></script>
</body>
</html>
