<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO リスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-wrapper">

    <header class="app-header">
      <h1 class="app-title">TODO リスト</h1>
    </header>

    <main class="app-main">

      <!-- タスク入力フォームエリア -->
      <section class="task-form" aria-label="タスク入力">
        <form class="task-form__inner" action="#" method="get">
          <label for="task-input" class="visually-hidden">新しいタスクを入力</label>
          <input
            id="task-input"
            class="task-form__input"
            type="text"
            placeholder="新しいタスクを入力..."
          >
          <button class="task-form__button" type="submit">追加</button>
        </form>
      </section>

      <!-- フィルターボタンエリア -->
      <section class="task-filter" aria-label="タスクフィルター">
        <button class="task-filter__button is-active" type="button">すべて</button>
        <button class="task-filter__button" type="button">未完了</button>
        <button class="task-filter__button" type="button">完了済み</button>
      </section>

      <!-- タスク一覧表示エリア -->
      <section class="task-list-section" aria-label="タスク一覧">
        <ul class="task-list">

          <!-- タスクアイテム（未完了）：牛乳を買う -->
          <li class="task-item">
            <label class="task-item__label">
              <input class="task-item__checkbox" type="checkbox">
              <span class="task-item__text">牛乳を買う</span>
            </label>
            <div class="task-item__actions">
              <button class="task-item__button task-item__button--edit" type="button">編集</button>
              <button class="task-item__button task-item__button--delete" type="button">削除</button>
            </div>
          </li>

          <!-- タスクアイテム（完了済み）：部屋を掃除する -->
          <li class="task-item is-completed">
            <label class="task-item__label">
              <input class="task-item__checkbox" type="checkbox" checked>
              <span class="task-item__text">部屋を掃除する</span>
            </label>
            <div class="task-item__actions">
              <button class="task-item__button task-item__button--edit" type="button">編集</button>
              <button class="task-item__button task-item__button--delete" type="button">削除</button>
            </div>
          </li>

          <!-- タスクアイテム（未完了）：メールを送る -->
          <li class="task-item">
            <label class="task-item__label">
              <input class="task-item__checkbox" type="checkbox">
              <span class="task-item__text">メールを送る</span>
            </label>
            <div class="task-item__actions">
              <button class="task-item__button task-item__button--edit" type="button">編集</button>
              <button class="task-item__button task-item__button--delete" type="button">削除</button>
            </div>
          </li>

        </ul>
      </section>

    </main>

    <footer class="app-footer">
      <p class="app-footer__text">3件のタスク（完了: 1件 / 未完了: 2件）</p>
    </footer>

  </div>
</body>
</html>
